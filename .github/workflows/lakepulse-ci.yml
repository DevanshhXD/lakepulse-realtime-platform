name: LakePulse CI Pipeline

on:

  push:
    branches:
      - develop
      - main

  pull_request:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5

        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Python Syntax Validation
        run: |
          python -m py_compile streaming/producer/*.py
          python -m py_compile spark/bronze/*.py
          python -m py_compile spark/silver/*.py
          python -m py_compile spark/gold/*.py

      - name: Build Producer Docker Image
        run: |
          docker build -f docker/Dockerfile.producer -t lakepulse-producer .

      - name: Build Spark Docker Image
        run: |
          docker build -f docker/Dockerfile.spark -t lakepulse-spark .

      - name: Build Airflow Docker Image
        run: |
          docker build -f docker/Dockerfile.airflow -t lakepulse-airflow .